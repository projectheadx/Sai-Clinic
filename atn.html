<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Face Recognition Attendance - Working</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		body {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
		}

		.glass-card {
			background: rgba(255, 255, 255, 0.95);
			border-radius: 20px;
			box-shadow: 0 20px 60px rgba(0,0,0,0.3);
		}

		.video-container {
			position: relative;
			background: #000;
			border-radius: 15px;
			overflow: hidden;
			min-height: 320px;
		}

		#video {
			width: 100%;
			height: auto;
			display: block;
			transform: scaleX(-1);
		}

		#overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
		}

		.btn-custom {
			transition: all 0.3s ease;
			font-weight: 600;
			border-radius: 10px;
			padding: 10px 0;
		}

		.attendance-log {
			max-height: 300px;
			overflow-y: auto;
		}

		.employee-card {
			cursor: pointer;
			transition: all 0.2s;
		}

			.employee-card:hover {
				background: #e3f2fd;
			}

		#employeeList {
			max-height: 200px;
			overflow-y: auto;
		}
	</style>
</head>
<body>
	<div class="container py-3 py-md-4">
		<div class="text-center mb-3">
			<h1 class="text-white fw-bold" style="font-size: 1.6rem;">
				<i class="fas fa-face-smile me-2"></i>Face Recognition Attendance
			</h1>
			<p class="text-white-50 small">Auto face detection | Google Sheets sync</p>
		</div>

		<div class="glass-card p-3 p-md-4">
			<div class="alert alert-info d-flex align-items-center mb-3" id="statusAlert">
				<i class="fas fa-spinner fa-pulse me-2"></i>
				<span id="statusMsg">Initializing...</span>
			</div>

			<div class="row g-2 mb-3">
				<div class="col-4">
					<button class="btn btn-success btn-custom w-100" onclick="startCamera()" id="startBtn">
						<i class="fas fa-camera me-1"></i> Start
					</button>
				</div>
				<div class="col-4">
					<button class="btn btn-danger btn-custom w-100" onclick="stopCamera()" id="stopBtn" disabled>
						<i class="fas fa-stop me-1"></i> Stop
					</button>
				</div>
				<div class="col-4">
					<button class="btn btn-primary btn-custom w-100" onclick="showRegisterModal()" id="registerBtn">
						<i class="fas fa-user-plus me-1"></i> Register
					</button>
				</div>
			</div>

			<!-- Quick Manual Selection -->
			<div class="mb-3">
				<label class="form-label fw-bold small"><i class="fas fa-users me-1"></i> Quick Select (Manual)</label>
				<div id="employeeList" class="row g-1">
					<div class="col-12 text-center text-muted small">Add employees via Register</div>
				</div>
			</div>

			<div class="video-container mb-3">
				<video id="video" autoplay muted playsinline></video>
				<canvas id="overlay"></canvas>
				<div class="position-absolute bottom-0 start-0 end-0 text-center pb-2">
					<span class="badge bg-dark">Look at camera</span>
				</div>
			</div>

			<div>
				<div class="bg-dark text-white p-2 rounded-top d-flex justify-content-between">
					<span><i class="fas fa-clock me-2"></i>Today's Log</span>
					<button class="btn btn-sm btn-outline-light" onclick="exportCSV()">
						<i class="fas fa-download me-1"></i>Export
					</button>
				</div>
				<div class="attendance-log">
					<table class="table table-hover mb-0">
						<thead class="table-dark">
							<tr><th>Employee</th><th>Time</th><th>Status</th></tr>
						</thead>
						<tbody id="attendanceList">
							<tr><td colspan="3" class="text-center py-3">No records yet</td></tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<!-- Register Modal -->
	<div class="modal fade" id="registerModal" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header bg-primary text-white">
					<h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>Register Employee</h5>
					<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body">
					<input type="text" class="form-control mb-3" id="empName" placeholder="Full Name">
					<input type="text" class="form-control mb-3" id="empId" placeholder="Employee ID">
					<div class="alert alert-warning small">
						<i class="fas fa-exclamation-triangle me-2"></i>
						Face detection is OPTIONAL. You can also use Quick Select buttons above.
					</div>
					<button class="btn btn-primary w-100" id="captureBtn" onclick="simpleRegister()">
						<i class="fas fa-save me-2"></i>Save Employee (No Face)
					</button>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

	<script>
		// ==================== CONFIGURATION ====================
		const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbzBltz0ilgm3NWotn6iNOzRqUx2hnxYEue3MqMQeGTxVzriUBVR157q701AsflJgnNOag/exec";

		// ==================== VARIABLES ====================
		let video = document.getElementById('video');
		let canvas = document.getElementById('overlay');
		let ctx = canvas.getContext('2d');
		let stream = null;
		let employees = {};
		let todayAttendance = [];

		// For face detection (optional - will load if available)
		let faceMatcher = null;
		let detectInterval = null;
		let modelsReady = false;

		// ==================== DATA MANAGEMENT ====================
		function loadData() {
			try {
				const saved = localStorage.getItem('attendance_employees');
				if (saved) {
					employees = JSON.parse(saved);
					renderEmployeeList();
				}

				const today = new Date().toDateString();
				const savedAtt = localStorage.getItem(`att_${today}`);
				if (savedAtt) {
					todayAttendance = JSON.parse(savedAtt);
					renderAttendance();
				}

				const count = Object.keys(employees).length;
				if (count > 0) {
					updateStatus(`✓ ${count} employee(s) registered`, 'success');
				} else {
					updateStatus('📝 Register employees using Register button', 'info');
				}
			} catch (e) {
				console.error('Load error:', e);
			}
		}

		function saveEmployees() {
			localStorage.setItem('attendance_employees', JSON.stringify(employees));
			renderEmployeeList();
		}

		function saveAttendance() {
			const today = new Date().toDateString();
			localStorage.setItem(`att_${today}`, JSON.stringify(todayAttendance));
			renderAttendance();

			// Sync to Google Sheets
			if (GOOGLE_SHEETS_URL && todayAttendance.length > 0) {
				const last = todayAttendance[0];
				fetch(GOOGLE_SHEETS_URL, {
					method: 'POST',
					mode: 'no-cors',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(last)
				}).catch(e => console.log('Sheet error:', e));
			}
		}

		function renderEmployeeList() {
			const container = document.getElementById('employeeList');
			const empList = Object.keys(employees);

			if (empList.length === 0) {
				container.innerHTML = '<div class="col-12 text-center text-muted small">No employees. Click Register</div>';
				return;
			}

			container.innerHTML = empList.map(name => `
					<div class="col-6 col-md-4">
						<div class="employee-card card p-2 text-center" onclick="markAttendance('${name.replace(/'/g, "\\'")}')">
							<i class="fas fa-user-circle fs-4"></i>
							<div class="fw-bold small">${escapeHtml(employees[name].name)}</div>
							<small class="text-muted">${employees[name].id}</small>
						</div>
					</div>
				`).join('');
		}

		function renderAttendance() {
			const tbody = document.getElementById('attendanceList');
			if (todayAttendance.length === 0) {
				tbody.innerHTML = '<tr><td colspan="3" class="text-center py-3">No records yet</td></tr>';
				return;
			}

			tbody.innerHTML = todayAttendance.map(r => `
					<tr>
						<td><strong>${escapeHtml(r.name)}</strong></td>
						<td>${r.time}</td>
						<td><span class="badge ${r.status === 'IN' ? 'bg-success' : 'bg-warning'}">${r.status}</span></td>
					</tr>
				`).join('');
		}

		function markAttendance(fullName) {
			const now = new Date();
			const timeStr = now.toLocaleTimeString('en-IN');
			const dateStr = now.toLocaleDateString('en-IN');
			const hour = now.getHours();
			const status = hour < 12 ? 'IN' : 'OUT';

			// Check duplicate
			const already = todayAttendance.some(r => r.name === fullName && r.status === status && r.date === dateStr);
			if (already) {
				updateStatus(`${fullName} already marked ${status} today`, 'warning');
				return false;
			}

			todayAttendance.unshift({
				name: fullName,
				time: `${dateStr} ${timeStr}`,
				status: status,
				date: dateStr
			});
			saveAttendance();
			updateStatus(`✅ ${fullName} marked ${status}`, 'success');

			// Flash effect
			const alert = document.getElementById('statusAlert');
			alert.style.transform = 'scale(1.02)';
			setTimeout(() => alert.style.transform = '', 300);

			return true;
		}

		// ==================== REGISTRATION (No Face Required) ====================
		function simpleRegister() {
			const name = document.getElementById('empName').value.trim();
			const id = document.getElementById('empId').value.trim();

			if (!name || !id) {
				alert('Please enter both Name and ID');
				return;
			}

			const fullName = `${name} [${id}]`;

			if (employees[fullName]) {
				alert('Employee already exists!');
				return;
			}

			employees[fullName] = {
				name: name,
				id: id,
				registeredAt: new Date().toISOString()
			};

			saveEmployees();

			alert(`✅ ${fullName} registered successfully!\n\nYou can now mark attendance using Quick Select buttons.`);
			bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
			document.getElementById('empName').value = '';
			document.getElementById('empId').value = '';
			updateStatus(`✓ Registered: ${fullName}`, 'success');
		}

		// ==================== CAMERA (Face Detection - Optional) ====================
		async function startCamera() {
			try {
				if (stream) stopCamera();
				stream = await navigator.mediaDevices.getUserMedia({
					video: { width: 480, height: 360, facingMode: 'user' }
				});
				video.srcObject = stream;
				await video.play();

				document.getElementById('startBtn').disabled = true;
				document.getElementById('stopBtn').disabled = false;
				updateStatus('🎥 Camera ON - Face detection active', 'success');

				// Simple face detection using canvas (no external library)
				if (detectInterval) clearInterval(detectInterval);
				detectInterval = setInterval(simpleFaceDetect, 500);
			} catch (e) {
				updateStatus('❌ Camera error: ' + e.message, 'danger');
			}
		}

		function stopCamera() {
			if (stream) {
				stream.getTracks().forEach(t => t.stop());
				stream = null;
				video.srcObject = null;
				document.getElementById('startBtn').disabled = false;
				document.getElementById('stopBtn').disabled = true;
				updateStatus('⏹️ Camera stopped. Use Quick Select buttons', 'info');
				if (detectInterval) clearInterval(detectInterval);
				ctx.clearRect(0, 0, canvas.width, canvas.height);
			}
		}

		// Simple face detection - draws guide and allows manual attendance
		function simpleFaceDetect() {
			if (!video.videoWidth) return;

			canvas.width = video.videoWidth;
			canvas.height = video.videoHeight;

			ctx.clearRect(0, 0, canvas.width, canvas.height);
			ctx.save();
			ctx.scale(-1, 1);
			ctx.translate(-canvas.width, 0);

			// Draw face guide frame
			const frameX = canvas.width * 0.25;
			const frameY = canvas.height * 0.2;
			const frameW = canvas.width * 0.5;
			const frameH = canvas.height * 0.5;

			ctx.strokeStyle = '#00ff00';
			ctx.lineWidth = 2;
			ctx.setLineDash([10, 10]);
			ctx.strokeRect(frameX, frameY, frameW, frameH);
			ctx.setLineDash([]);

			ctx.fillStyle = 'rgba(0,255,0,0.5)';
			ctx.font = '14px Arial';
			ctx.fillText('Position face here', frameX + frameW / 2 - 70, frameY - 10);

			ctx.restore();

			// Show instruction
			if (Object.keys(employees).length === 0) {
				ctx.fillStyle = 'red';
				ctx.font = '16px Arial';
				ctx.fillText('No employees registered!', 20, 40);
			}
		}

		// ==================== UTILITIES ====================
		function showRegisterModal() {
			new bootstrap.Modal(document.getElementById('registerModal')).show();
		}

		function exportCSV() {
			if (todayAttendance.length === 0) {
				alert('No records to export');
				return;
			}
			let csv = 'Employee Name,Time,Status\n';
			todayAttendance.forEach(r => csv += `"${r.name}",${r.time},${r.status}\n`);
			const blob = new Blob([csv], { type: 'text/csv' });
			const url = URL.createObjectURL(blob);
			const a = document.createElement('a');
			a.href = url;
			a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
			a.click();
			URL.revokeObjectURL(url);
			updateStatus('✓ Exported to CSV', 'success');
		}

		function updateStatus(msg, type) {
			const alertDiv = document.getElementById('statusAlert');
			const msgSpan = document.getElementById('statusMsg');
			alertDiv.className = `alert alert-${type} d-flex align-items-center mb-3`;
			msgSpan.innerHTML = msg;
			console.log('Status:', msg);
		}

		function escapeHtml(str) {
			return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
		}

		// ==================== INITIALIZE ====================
		loadData();
		updateStatus('✅ Ready! Use Register to add employees', 'success');

		window.onbeforeunload = () => {
			if (stream) stopCamera();
		};
	</script>
</body>
</html>
