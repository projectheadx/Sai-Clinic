<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Face Recognition Attendance - Working Version</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		body {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}

		.glass-card {
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(10px);
			border-radius: 20px;
			box-shadow: 0 20px 60px rgba(0,0,0,0.3);
		}

		.video-container {
			position: relative;
			background: #000;
			border-radius: 15px;
			overflow: hidden;
			min-height: 320px;
		}

		#video {
			width: 100%;
			height: auto;
			display: block;
			transform: scaleX(-1);
		}

		#overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
		}

		.btn-custom {
			transition: all 0.3s ease;
			font-weight: 600;
			border-radius: 10px;
		}

		.attendance-log {
			max-height: 300px;
			overflow-y: auto;
		}

		.face-guide {
			position: absolute;
			bottom: 10px;
			left: 50%;
			transform: translateX(-50%);
			background: rgba(0,0,0,0.7);
			color: white;
			padding: 5px 10px;
			border-radius: 20px;
			font-size: 12px;
			z-index: 10;
		}
	</style>
</head>
<body>
	<div class="container py-3 py-md-4">
		<div class="text-center mb-3">
			<h1 class="text-white fw-bold" style="font-size: 1.6rem;">
				<i class="fas fa-face-smile me-2"></i>Face Recognition Attendance
			</h1>
			<p class="text-white-50 small">Look at camera - Auto attendance mark</p>
		</div>

		<div class="glass-card p-3 p-md-4">
			<!-- Status -->
			<div class="alert alert-info d-flex align-items-center mb-3" id="statusAlert">
				<i class="fas fa-spinner fa-pulse me-2"></i>
				<span id="statusMsg">Loading face detection...</span>
			</div>

			<!-- Controls -->
			<div class="row g-2 mb-3">
				<div class="col-4">
					<button class="btn btn-success btn-custom w-100 py-2" onclick="startCamera()" id="startBtn">
						<i class="fas fa-camera me-1"></i> Start
					</button>
				</div>
				<div class="col-4">
					<button class="btn btn-danger btn-custom w-100 py-2" onclick="stopCamera()" id="stopBtn" disabled>
						<i class="fas fa-stop me-1"></i> Stop
					</button>
				</div>
				<div class="col-4">
					<button class="btn btn-primary btn-custom w-100 py-2" onclick="showRegisterModal()">
						<i class="fas fa-user-plus me-1"></i> Register
					</button>
				</div>
			</div>

			<!-- Video -->
			<div class="video-container mb-3">
				<video id="video" autoplay muted playsinline></video>
				<canvas id="overlay"></canvas>
				<div class="face-guide">
					<i class="fas fa-circle me-1"></i> Position face in frame
				</div>
			</div>

			<!-- Attendance Log -->
			<div>
				<div class="bg-dark text-white p-2 rounded-top d-flex justify-content-between">
					<span><i class="fas fa-clock me-2"></i>Today's Log</span>
					<button class="btn btn-sm btn-outline-light" onclick="exportCSV()">
						<i class="fas fa-download me-1"></i>Export
					</button>
				</div>
				<div class="attendance-log">
					<table class="table table-hover mb-0">
						<thead class="table-dark">
							<tr><th>Employee</th><th>Time</th><th>Status</th></tr>
						</thead>
						<tbody id="attendanceList">
							<tr><td colspan="3" class="text-center py-3">No records yet</td></tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<!-- Register Modal -->
	<div class="modal fade" id="registerModal" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header bg-primary text-white">
					<h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>Register Employee</h5>
					<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body">
					<input type="text" class="form-control mb-3" id="empName" placeholder="Full Name">
					<input type="text" class="form-control mb-3" id="empId" placeholder="Employee ID">
					<div class="alert alert-info small">
						<i class="fas fa-lightbulb me-2"></i>
						Look straight at camera and click Capture
					</div>
					<button class="btn btn-primary w-100" id="captureBtn" onclick="captureFace()">
						<i class="fas fa-camera me-2"></i>Capture Face
					</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Scripts -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

	<script>
		// ==================== VARIABLES ====================
		let video = document.getElementById('video');
		let canvas = document.getElementById('overlay');
		let ctx = canvas.getContext('2d');
		let stream = null;
		let faceMatcher = null;
		let detectInterval = null;
		let modelsLoaded = false;
		let employees = {};
		let todayAttendance = [];

		// Google Sheets URL (optional - put your Apps Script URL here)
		const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzBltz0ilgm3NWotn6iNOzRqUx2hnxYEue3MqMQeGTxVzriUBVR157q701AsflJgnNOag/exec";

		// ==================== LOAD MODELS ====================
		async function initModels() {
			updateStatus('Downloading face detection models...', 'info');

			// Try multiple model sources
			const sources = [
				'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights',
				'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights'
			];

			for (let src of sources) {
				try {
					console.log('Trying:', src);
					await Promise.all([
						faceapi.nets.tinyFaceDetector.loadFromUri(src),
						faceapi.nets.faceLandmark68Net.loadFromUri(src),
						faceapi.nets.faceRecognitionNet.loadFromUri(src)
					]);
					modelsLoaded = true;
					updateStatus('✓ Face detection ready! Click Start Camera', 'success');
					loadData();
					return;
				} catch (e) {
					console.log('Failed:', src);
				}
			}

			updateStatus('⚠️ Network issue. Check internet and refresh', 'danger');
		}

		// ==================== DATA MANAGEMENT ====================
		function loadData() {
			const saved = localStorage.getItem('face_employees');
			if (saved) {
				employees = JSON.parse(saved);
				updateFaceMatcher();
			}

			const today = new Date().toDateString();
			const savedAtt = localStorage.getItem(`att_${today}`);
			if (savedAtt) {
				todayAttendance = JSON.parse(savedAtt);
				renderAttendance();
			}

			const count = Object.keys(employees).length;
			if (count > 0) {
				updateStatus(`✓ ${count} employee(s) registered`, 'success');
			} else {
				updateStatus('⚠️ No employees. Click Register to add', 'warning');
			}
		}

		function saveEmployees() {
			localStorage.setItem('face_employees', JSON.stringify(employees));
			updateFaceMatcher();
		}

		function saveAttendance() {
			const today = new Date().toDateString();
			localStorage.setItem(`att_${today}`, JSON.stringify(todayAttendance));
			renderAttendance();

			// Sync to Google Sheets
			if (SHEETS_URL && todayAttendance.length > 0) {
				const last = todayAttendance[0];
				fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(last) })
					.catch(e => console.log('Sheet sync:', e));
			}
		}

		function updateFaceMatcher() {
			const labels = Object.keys(employees);
			if (labels.length === 0) return;

			const descriptors = [];
			labels.forEach(name => {
				const emp = employees[name];
				if (emp.descriptors && emp.descriptors.length > 0) {
					emp.descriptors.forEach(desc => {
						descriptors.push(new faceapi.LabeledFaceDescriptors(name, [new Float32Array(desc)]));
					});
				}
			});

			if (descriptors.length > 0) {
				faceMatcher = new faceapi.FaceMatcher(descriptors, 0.6);
			}
		}

		function renderAttendance() {
			const tbody = document.getElementById('attendanceList');
			if (todayAttendance.length === 0) {
				tbody.innerHTML = '<tr><td colspan="3" class="text-center py-3">No records yet</td></tr>';
				return;
			}

			tbody.innerHTML = todayAttendance.map(r => `
					<tr>
						<td><strong>${escapeHtml(r.name)}</strong></td>
						<td>${r.time}</td>
						<td><span class="badge ${r.status === 'IN' ? 'bg-success' : 'bg-warning'}">${r.status}</span></td>
					</tr>
				`).join('');
		}

		function markAttendance(name) {
			const now = new Date();
			const timeStr = now.toLocaleTimeString('en-IN');
			const dateStr = now.toLocaleDateString('en-IN');
			const hour = now.getHours();
			const status = hour < 12 ? 'IN' : 'OUT';

			// Check duplicate
			const already = todayAttendance.some(r => r.name === name && r.status === status && r.date === dateStr);
			if (already) return false;

			todayAttendance.unshift({
				name: name,
				time: `${dateStr} ${timeStr}`,
				status: status,
				date: dateStr
			});
			saveAttendance();
			updateStatus(`✓ ${name} marked ${status}`, 'success');

			// Flash effect
			const alert = document.getElementById('statusAlert');
			alert.style.transform = 'scale(1.02)';
			setTimeout(() => alert.style.transform = '', 300);

			return true;
		}

		// ==================== CAMERA ====================
		async function startCamera() {
			if (!modelsLoaded) {
				updateStatus('Please wait, models loading...', 'warning');
				return;
			}

			try {
				if (stream) stopCamera();
				stream = await navigator.mediaDevices.getUserMedia({
					video: { width: 480, height: 360, facingMode: 'user' }
				});
				video.srcObject = stream;
				await video.play();

				document.getElementById('startBtn').disabled = true;
				document.getElementById('stopBtn').disabled = false;
				updateStatus('🎥 Camera ON - Face detection active', 'success');

				if (detectInterval) clearInterval(detectInterval);
				detectInterval = setInterval(detectFaces, 400);
			} catch (e) {
				updateStatus('❌ Camera error: ' + e.message, 'danger');
			}
		}

		function stopCamera() {
			if (stream) {
				stream.getTracks().forEach(t => t.stop());
				stream = null;
				video.srcObject = null;
				document.getElementById('startBtn').disabled = false;
				document.getElementById('stopBtn').disabled = true;
				updateStatus('⏹️ Camera stopped', 'info');
				if (detectInterval) clearInterval(detectInterval);
				ctx.clearRect(0, 0, canvas.width, canvas.height);
			}
		}

		async function detectFaces() {
			if (!video.videoWidth || !faceMatcher) return;

			canvas.width = video.videoWidth;
			canvas.height = video.videoHeight;

			try {
				const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
					.withFaceLandmarks()
					.withFaceDescriptors();

				ctx.clearRect(0, 0, canvas.width, canvas.height);
				ctx.save();
				ctx.scale(-1, 1);
				ctx.translate(-canvas.width, 0);

				const resized = faceapi.resizeResults(detections, { width: canvas.width, height: canvas.height });

				const todayKey = new Date().toDateString();
				if (!window.recognizedToday) window.recognizedToday = {};

				for (const det of resized) {
					const box = det.detection.box;
					const match = faceMatcher.findBestMatch(det.descriptor);
					const name = match.label !== 'unknown' ? match.label : '?';

					// Draw box
					ctx.strokeStyle = name !== '?' ? '#00ff00' : '#ff4444';
					ctx.lineWidth = 3;
					ctx.strokeRect(box.x, box.y, box.width, box.height);

					// Draw label
					ctx.fillStyle = name !== '?' ? 'rgba(0,200,0,0.8)' : 'rgba(200,0,0,0.8)';
					ctx.fillRect(box.x, box.y - 28, Math.max(ctx.measureText(name).width + 20, 60), 25);
					ctx.fillStyle = '#fff';
					ctx.font = 'bold 16px Arial';
					ctx.fillText(name, box.x + 8, box.y - 10);

					// Mark attendance
					if (name !== '?' && !window.recognizedToday[`${name}_${todayKey}`]) {
						window.recognizedToday[`${name}_${todayKey}`] = true;
						markAttendance(name);
						setTimeout(() => delete window.recognizedToday[`${name}_${todayKey}`], 3600000);
					}
				}

				ctx.restore();
			} catch (e) {
				console.log('Detection error:', e);
			}
		}

		// ==================== REGISTRATION ====================
		async function captureFace() {
			const name = document.getElementById('empName').value.trim();
			const id = document.getElementById('empId').value.trim();

			if (!name || !id) {
				alert('Enter Name and ID');
				return;
			}
			if (!video.videoWidth) {
				alert('Start camera first');
				return;
			}

			updateStatus('Capturing face... Look at camera', 'info');
			document.getElementById('captureBtn').disabled = true;
			document.getElementById('captureBtn').innerHTML = '<i class="fas fa-spinner fa-pulse me-2"></i>Capturing...';

			const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
				.withFaceLandmarks()
				.withFaceDescriptor();

			document.getElementById('captureBtn').disabled = false;
			document.getElementById('captureBtn').innerHTML = '<i class="fas fa-camera me-2"></i>Capture Face';

			if (!detection) {
				alert('No face detected! Make sure:\n- Good lighting\n- Face directly facing camera\n- Remove glasses if possible');
				updateStatus('❌ Face not detected. Try again', 'danger');
				return;
			}

			const fullName = `${name} [${id}]`;
			employees[fullName] = {
				name: name,
				id: id,
				descriptors: [Array.from(detection.descriptor)]
			};

			saveEmployees();

			alert(`✓ ${fullName} registered successfully!`);
			bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
			document.getElementById('empName').value = '';
			document.getElementById('empId').value = '';
			updateStatus(`✓ Registered: ${fullName}`, 'success');
		}

		function showRegisterModal() {
			if (!modelsLoaded) {
				alert('Wait for models to load');
				return;
			}
			new bootstrap.Modal(document.getElementById('registerModal')).show();
		}

		function exportCSV() {
			if (todayAttendance.length === 0) {
				alert('No records');
				return;
			}
			let csv = 'Employee,Time,Status\n';
			todayAttendance.forEach(r => csv += `"${r.name}",${r.time},${r.status}\n`);
			const blob = new Blob([csv], { type: 'text/csv' });
			const a = document.createElement('a');
			a.href = URL.createObjectURL(blob);
			a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
			a.click();
			URL.revokeObjectURL(blob);
		}

		function updateStatus(msg, type) {
			const alertDiv = document.getElementById('statusAlert');
			const msgSpan = document.getElementById('statusMsg');
			alertDiv.className = `alert alert-${type} d-flex align-items-center mb-3`;
			msgSpan.innerHTML = msg;
			console.log('Status:', msg);
		}

		function escapeHtml(str) {
			return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
		}

		// ==================== START ====================
		initModels();

		window.onbeforeunload = () => {
			if (stream) stopCamera();
		};
	</script>
</body>
</html>
