<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Machi Corporate Billing & TDS Ledger</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			background-color: #f4f7fc;
			font-family: 'Segoe UI', system-ui, sans-serif;
		}

		.card {
			border: none;
			box-shadow: 0 4px 20px rgba(0,0,0,0.05);
			border-radius: 12px;
		}

		.bg-cancelled {
			background-color: #f8d7da !important;
			opacity: 0.6;
			text-decoration: line-through;
		}

		.table th {
			background-color: #f1f4f9;
			font-weight: 600;
			font-size: 0.85rem;
		}

		.table td {
			font-size: 0.9rem;
		}
	</style>
</head>
<body>

	<div class="container-fluid px-4 py-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="text-primary fw-bold m-0">💼 Machi Premium Billing & TDS Tracker</h2>
			<button class="btn btn-success fw-bold" onclick="exportToExcel()">📊 Export Ledger (.csv)</button>
		</div>

		<div class="row g-4">
			<div class="col-xl-3 col-lg-4">
				<div class="card p-4 sticky-top" style="top: 20px;">
					<h5 class="mb-3 text-secondary border-bottom pb-2">Generate Invoice</h5>
					<form id="invoiceForm">
						<div class="mb-2">
							<label class="form-label small fw-bold">Invoice No</label>
							<input type="text" id="invoiceNo" class="form-control form-control-sm" required placeholder="INV/26-27/01">
						</div>
						<div class="mb-2">
							<label class="form-label small fw-bold">Invoice Date</label>
							<input type="date" id="invoiceDate" class="form-control form-control-sm" required>
						</div>
						<div class="mb-2">
							<label class="form-label small fw-bold">Client Name</label>
							<input type="text" id="receivedFrom" class="form-control form-control-sm" required placeholder="Corporate Client">
						</div>

						<div class="row g-2 mb-2">
							<div class="col-7">
								<label class="form-label small fw-bold text-dark">Total Project Val (₹)</label>
								<input type="number" id="projectValue" class="form-control form-control-sm" required placeholder="50000" oninput="calculateMilestoneAmount()">
							</div>
							<div class="col-5">
								<label class="form-label small fw-bold text-dark">Bill %</label>
								<select id="billPercentage" class="form-select form-select-sm" onchange="calculateMilestoneAmount()">
									<option value="10">10%</option>
									<option value="20">20%</option>
									<option value="25" selected>25%</option>
									<option value="50">50%</option>
									<option value="75">75%</option>
									<option value="100">100%</option>
								</select>
							</div>
						</div>

						<div class="mb-2">
							<label class="form-label small text-muted">Calculated Base Amount (₹)</label>
							<input type="number" id="amount" class="form-control form-control-sm bg-light" readonly>
						</div>

						<div class="row mb-3 g-2">
							<div class="col">
								<label class="form-label small text-muted">GST (18%)</label>
								<input type="number" id="gstAmt" class="form-control form-control-sm bg-light" readonly>
							</div>
							<div class="col">
								<label class="form-label small fw-bold text-success">Total Bill (₹)</label>
								<input type="number" id="totalAmount" class="form-control form-control-sm bg-light fw-bold text-success" readonly>
							</div>
						</div>

						<div class="mb-3">
							<label class="form-label small fw-bold">Work Scope Description</label>
							<textarea id="description" class="form-control form-control-sm" rows="2" placeholder="Milestone notes..."></textarea>
						</div>

						<button type="submit" class="btn btn-primary w-100 fw-bold">💾 Save Invoice</button>
					</form>
				</div>
			</div>

			<div class="col-xl-9 col-lg-8">
				<div class="card p-4 mb-4">
					<div class="row g-2">
						<div class="col-md-4">
							<input type="text" id="textSearch" class="form-control form-control-sm" placeholder="Search Client / Inv No..." oninput="filterAndResetPage()">
						</div>
						<div class="col-md-4">
							<div class="input-group input-group-sm">
								<span class="input-group-text">From</span>
								<input type="date" id="fromDate" class="form-control" onchange="filterAndResetPage()">
							</div>
						</div>
						<div class="col-md-4">
							<div class="input-group input-group-sm">
								<span class="input-group-text">To</span>
								<input type="date" id="toDate" class="form-control" onchange="filterAndResetPage()">
							</div>
						</div>
					</div>
				</div>

				<div class="card p-4">
					<div class="d-flex justify-content-between align-items-center mb-3">
						<h5 class="m-0 text-secondary fw-bold">Live Billing Execution Panel</h5>
						<button class="btn btn-sm btn-outline-primary" onclick="fetchInvoices()">🔄 Reload Sheets</button>
					</div>

					<div class="table-responsive">
						<table class="table align-middle table-hover table-bordered">
							<thead>
								<tr>
									<th>Invoice Details</th>
									<th>Client Metric</th>
									<th>Base Amt</th>
									<th>GST (18%)</th>
									<th>Total Bill</th>
									<th class="table-info text-center" style="width: 250px;">Received & TDS Update Workspace</th>
									<th class="text-danger">Difference / Bal</th>
									<th class="text-center">Action</th>
								</tr>
							</thead>
							<tbody id="invoiceTableBody">
								<tr>
									<td colspan="8" class="text-center text-muted py-4">Waiting connection setup variables...</td>
								</tr>
							</tbody>
						</table>
					</div>

					<div class="d-flex justify-content-between align-items-center mt-3">
						<div id="paginationInfo" class="text-muted small">Showing 0 of 0 logs</div>
						<nav><ul class="pagination pagination-sm m-0" id="paginationControls"></ul></nav>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		// ⚠️ DEPLOYED WEB APP API URL PASTE HERE
		const API_URL = "https://script.google.com/macros/s/AKfycbzisY99cBJJzVx41R9oMR3XM1wh5dqg6J0kqviSQh2AILrXT3od6RAH2BDuX_fbf5qgTg/exec";

		let allInvoices = [];
		let filteredInvoices = [];
		let currentPage = 1;
		let recordsPerPage = 10;

		// Automatic Milestone Calculation Engine
		function calculateMilestoneAmount() {
			const totalProjectVal = parseFloat(document.getElementById('projectValue').value) || 0;
			const selectedPercent = parseFloat(document.getElementById('billPercentage').value) || 0;

			// Base Amount = (Project Value * Percent) / 100
			const calculatedBase = (totalProjectVal * selectedPercent) / 100;
			document.getElementById('amount').value = calculatedBase.toFixed(2);

			const gst = calculatedBase * 0.18;
			document.getElementById('gstAmt').value = gst.toFixed(2);
			document.getElementById('totalAmount').value = (calculatedBase + gst).toFixed(2);
		}

		window.onload = function () {
			document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
			fetchInvoices();
		};

		async function fetchInvoices() {
			if (API_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") return;
			try {
				const response = await fetch(API_URL);
				allInvoices = await response.json();
				allInvoices.reverse();
				filterData();
			} catch (error) {
				console.error(error);
				document.getElementById('invoiceTableBody').innerHTML = `<tr><td colspan="8" class="text-center text-danger">API Link Validation Failed.</td></tr>`;
			}
		}

		function filterAndResetPage() { currentPage = 1; filterData(); }

		function filterData() {
			const searchText = document.getElementById('textSearch').value.toLowerCase();
			const fromDateStr = document.getElementById('fromDate').value;
			const toDateStr = document.getElementById('toDate').value;

			filteredInvoices = allInvoices.filter(item => {
				const matchText = item.invoiceNo.toLowerCase().includes(searchText) || item.receivedFrom.toLowerCase().includes(searchText);
				let matchDate = true;
				if (item.invoiceDate) {
					const itemDate = new Date(item.invoiceDate).setHours(0, 0, 0, 0);
					if (fromDateStr) { if (itemDate < new Date(fromDateStr).setHours(0, 0, 0, 0)) matchDate = false; }
					if (toDateStr) { if (itemDate > new Date(toDateStr).setHours(0, 0, 0, 0)) matchDate = false; }
				}
				return matchText && matchDate;
			});
			renderPaginatedTable();
		}

		function renderPaginatedTable() {
			const tbody = document.getElementById('invoiceTableBody');
			tbody.innerHTML = "";

			const totalRecords = filteredInvoices.length;
			const totalPages = Math.ceil(totalRecords / recordsPerPage) || 1;
			const startIndex = (currentPage - 1) * recordsPerPage;
			const endIndex = Math.min(startIndex + recordsPerPage, totalRecords);
			const paginatedItems = filteredInvoices.slice(startIndex, startIndex + recordsPerPage);

			if (paginatedItems.length === 0) {
				tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted">No configuration match profiles tracked.</td></tr>`;
				return;
			}

			paginatedItems.forEach(item => {
				const isCancelled = item.status === "Cancelled";
				const rowClass = isCancelled ? "bg-cancelled" : "";
				const fInvDate = item.invoiceDate ? new Date(item.invoiceDate).toLocaleDateString('en-IN') : '-';

				// Variance Dynamic formatting
				const diffValue = parseFloat(item.variance || 0);
				let diffBadging = `<span class="fw-bold text-danger">₹${diffValue.toFixed(2)}</span>`;
				if (diffValue <= 0 && !isCancelled) {
					diffBadging = `<span class="badge bg-success">Fully Cleared (₹0)</span>`;
				}

				// Calculation Entry Form Layout
				let updateSection = "";
				if (isCancelled) {
					updateSection = `<span class="text-danger fw-bold">CANCELLED PROFILE</span>`;
				} else if (item.amountReceivedDate && diffValue <= 0) {
					updateSection = `
						<div class="small">
							<b class="text-success">✔ Cleared:</b> ₹${parseFloat(item.receivedAmount).toFixed(2)}<br>
							<b class="text-secondary">TDS Ded:</b> ₹${parseFloat(item.tdsAmount).toFixed(2)}<br>
							<small class="text-muted">On: ${new Date(item.amountReceivedDate).toLocaleDateString('en-IN')}</small>
						</div>`;
				} else {
					// If pending or partial payment, show update workspace inside the cell row
					updateSection = `
						<div class="p-2 border rounded bg-light shadow-sm">
							<div class="mb-1">
								<input type="date" id="col-date-${item.invoiceNo}" class="form-control form-control-sm" title="Received Date">
							</div>
							<div class="input-group input-group-sm mb-1">
								<input type="number" id="col-rec-${item.invoiceNo}" class="form-control" placeholder="Received Amt" title="Received Amt">
								<input type="number" id="col-tds-${item.invoiceNo}" class="form-control" placeholder="TDS Amt" title="TDS Amt">
							</div>
							<button class="btn btn-primary btn-sm w-100 fw-bold py-0" style="font-size:0.75rem;" onclick="saveCollectionEntry('${item.invoiceNo}', ${item.totalAmount})">Update Payment</button>
						</div>`;
				}

				let actionSection = !isCancelled ? `<button class="btn btn-outline-danger btn-sm" onclick="cancelInvoice('${item.invoiceNo}')">🚫 Cancel</button>` : `-`;

				const row = `<tr class="${rowClass}">
					<td>
						<b class="text-primary">${item.invoiceNo}</b><br>
						<small class="text-muted">Date: ${fInvDate}</small>
					</td>
					<td>
						<b>${item.receivedFrom}</b><br>
						<small class="text-secondary">Proj Val: ₹${item.projectValue} (${item.billPercentage})</small>
					</td>
					<td>₹${parseFloat(item.amount).toFixed(2)}</td>
					<td>₹${parseFloat(item.gstAmt).toFixed(2)}</td>
					<td class="fw-bold">₹${parseFloat(item.totalAmount).toFixed(2)}</td>
					<td class="table-info">${updateSection}</td>
					<td>${diffBadging}</td>
					<td class="text-center">${actionSection}</td>
				</tr>`;
				tbody.insertAdjacentHTML('beforeend', row);
			});

			updatePaginationControls(totalPages, totalRecords, startIndex + 1, endIndex);
		}

		// Dynamic Calculation updates client side
		async function saveCollectionEntry(invoiceNo, totalBillAmount) {
			const dateVal = document.getElementById(`col-date-${invoiceNo}`).value;
			const receivedVal = parseFloat(document.getElementById(`col-rec-${invoiceNo}`).value) || 0;
			const tdsVal = parseFloat(document.getElementById(`col-tds-${invoiceNo}`).value) || 0;

			if (!dateVal) { alert("Machi, Payment Received Date rumba mukkiyam!"); return; }
			if (receivedVal <= 0) { alert("Enter valid received collection amount!"); return; }

			// Variance Equation: Total Bill - (Received Amount + TDS)
			const varianceVal = totalBillAmount - (receivedVal + tdsVal);

			if (!confirm(`Machi, confirm payment logging for invoice ${invoiceNo}?\nReceived: ₹${receivedVal}\nTDS: ₹${tdsVal}\nRemaining Variance: ₹${varianceVal.toFixed(2)}`)) return;

			try {
				await fetch(API_URL, {
					method: "POST",
					mode: "no-cors",
					body: JSON.stringify({
						action: "updateCollection",
						invoiceNo: invoiceNo,
						amountReceivedDate: dateVal,
						receivedAmount: receivedVal,
						tdsAmount: tdsVal,
						variance: varianceVal
					})
				});
				alert("Payment and TDS log synced successfully with Google Sheet!");
				fetchInvoices();
			} catch (e) { alert("API writing failure stream encountered."); }
		}

		async function cancelInvoice(invoiceNo) {
			if (!confirm(`Machi, are you sure you want to CANCEL ${invoiceNo}?`)) return;
			try {
				await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "cancelInvoice", invoiceNo: invoiceNo }) });
				alert("Invoice Status Updated to Cancelled.");
				fetchInvoices();
			} catch (e) { alert("Error updating status payload registry."); }
		}

		function updatePaginationControls(totalPages, totalRecords, start, end) {
			document.getElementById('paginationInfo').innerText = `Showing ${start} to ${end} of ${totalRecords} entries`;
			const controls = document.getElementById('paginationControls'); controls.innerHTML = "";
			controls.insertAdjacentHTML('beforeend', `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage - 1})">Prev</a></li>`);
			for (let i = 1; i <= totalPages; i++) {
				controls.insertAdjacentHTML('beforeend', `<li class="page-item ${currentPage === i ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`);
			}
			controls.insertAdjacentHTML('beforeend', `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage + 1})">Next</a></li>`);
		}

		function changePage(page) {
			if (page < 1 || page > Math.ceil(filteredInvoices.length / recordsPerPage)) return;
			currentPage = page; renderPaginatedTable();
		}

		function exportToExcel() {
			if (filteredInvoices.length === 0) return;
			let csvContent = "data:text/csv;charset=utf-8,Invoice Date,Invoice No,Client Name,Project Value,Bill Percent,Base Amount,GST Amount,Total Bill,Received Date,Received Amount,TDS Amount,Variance Balance,Status\n";
			filteredInvoices.forEach(r => {
				csvContent += [
					`"${r.invoiceDate || ''}"`, `"${r.invoiceNo || ''}"`, `"${r.receivedFrom}"`,
					`"${r.projectValue}"`, `"${r.billPercentage}"`, `"${r.amount}"`,
					`"${r.gstAmt}"`, `"${r.totalAmount}"`, `"${r.amountReceivedDate || 'Pending'}"`,
					`"${r.receivedAmount}"`, `"${r.tdsAmount}"`, `"${r.variance}"`, `"${r.status}"`
				].join(",") + "\n";
			});
			const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent));
			link.setAttribute("download", `Machi_Premium_Ledger_${new Date().toISOString().split('T')[0]}.csv`);
			document.body.appendChild(link); link.click(); document.body.removeChild(link);
		}

		document.getElementById('invoiceForm').addEventListener('submit', async function (e) {
			e.preventDefault();
			const formData = {
				action: "newInvoice",
				invoiceNo: document.getElementById('invoiceNo').value,
				invoiceDate: document.getElementById('invoiceDate').value,
				receivedFrom: document.getElementById('receivedFrom').value,
				projectValue: document.getElementById('projectValue').value,
				billPercentage: document.getElementById('billPercentage').value,
				amount: document.getElementById('amount').value,
				gstAmt: document.getElementById('gstAmt').value,
				totalAmount: document.getElementById('totalAmount').value,
				description: document.getElementById('description').value
			};
			const submitBtn = e.target.querySelector('button[type="submit"]');
			submitBtn.innerText = "Processing..."; submitBtn.disabled = true;
			try {
				await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(formData) });
				alert("Invoice Logged successfully!");
				document.getElementById('invoiceForm').reset();
				calculateMilestoneAmount();
				fetchInvoices();
			} catch (error) { alert("Network sync failed."); }
			finally { submitBtn.innerText = "💾 Save Invoice"; submitBtn.disabled = false; }
		});
	</script>
</body>
</html>
